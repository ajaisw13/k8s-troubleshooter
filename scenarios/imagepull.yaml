apiVersion: apps/v1
kind: Deployment
metadata:
  name: private-registry-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry-test
  template:
    metadata:
      labels:
        app: registry-test
    spec:
      imagePullSecrets:
      - name: registry-credentials
      containers:
      - name: secured-app
        image: private-registry.example.com/custom-image:v1.0
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi