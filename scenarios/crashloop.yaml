apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-check-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: health-checker
  template:
    metadata:
      labels:
        app: health-checker
    spec:
      containers:
      - name: health-probe
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
        - |
          counter=0
          while true; do
            if [ $counter -lt 3 ]; then
              echo "Running successfully"
              sleep 10
            else
              echo "Simulating failure"
              exit 1
            fi
            counter=$((counter+1))
          done
        livenessProbe:
          exec:
            command:
            - sh
            - -c
            - "exit 0"
          initialDelaySeconds: 5
          periodSeconds: 5