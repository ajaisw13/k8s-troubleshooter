services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ~/.kube/config-embedded:/root/.kube/config:ro
      - ~/.aws:/root/.aws:ro                        # EKS: AWS credentials + config
      - ~/.config/gcloud:/root/.config/gcloud:ro    # GKE: Application Default Credentials
    extra_hosts:
      - "host.docker.internal:host-gateway"         # local clusters only
  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - AGENT_API_URL=http://api:8080
    depends_on:
      - api
